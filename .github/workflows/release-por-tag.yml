name: Teste Release por Tag (React Native)

on:
  push:
    tags:
      - 'v*' # Automatically triggers whenever a tag starting with "v" is pushed (v1.0.0, v1.0.1, etc.)

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0 # Fetches all history to generate automatic release notes

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # FIXED STEP: Cleans cache and forces peer dependencies resolution to fix the @rneui bundle crash
      - name: Instalar Dependências do Projeto
        run: |
          npm cache clean --force
          # Instala primeiro as dependências normais do seu projeto
          npm install --legacy-peer-deps
          # CORREÇÃO: Força a injeção do pacote base ausente exigido pelo React Native Elements
          npm install @rneui/base --legacy-peer-deps


      - name: Configurar Java (Ambiente Android)
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # Compiles the actual Android project since the folder exists
      - name: Build Android Release (Simulado ou Real)
        run: |
          if [ -d "android" ]; then
            echo "===== Pasta Android encontrada! Iniciando build real ====="
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "===== Projeto sem pasta Android. Criando APK simulado para teste ====="
            mkdir -p android/app/build/outputs/apk/release
            echo "Conteudo simulado do instalador" > android/app/build/outputs/apk/release/app-release.apk
          fi

      - name: Criar GitHub Release e Anexar APK (API Nativa)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Captures the exact tag name (e.g., refs/tags/v1.0.1 -> v1.0.1)
            const tagName = context.ref.replace('refs/tags/', '');
            console.log(`Iniciando criação da Release para a tag: ${tagName}`);
            
            // 1. Creates the GitHub Release structure
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Release ${tagName}`,
              body: `## Atualização Mobile - ${tagName}\n- **Tag disparada:** \`${tagName}\`\n- **Autor do Push:** @${context.actor}\n\n*O changelog automático de commits foi anexado abaixo.*`,
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });

            // 2. Locates the compiled APK file
            const nomeArquivo = 'app-release.apk';
            const caminhoArquivo = path.join(
              process.env.GITHUB_WORKSPACE, 
              'android/app/build/outputs/apk/release', 
              nomeArquivo
            );
            
            // 3. Uploads the executable to the Release assets panel
            if (fs.existsSync(caminhoArquivo)) {
              console.log(`Encontrado instalador em: ${caminhoArquivo}`);
              const fileBuffer = fs.readFileSync(caminhoArquivo);
              
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: nomeArquivo,
                data: fileBuffer,
                headers: {
                  'content-type': 'application/vnd.android.package-archive',
                  'content-length': fileBuffer.length
                }
              });
              console.log('Upload do APK concluído com sucesso!');
            } else {
              throw new Error(`Arquivo APK não localizado em: ${caminhoArquivo}`);
            }
